name: Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test, lint and build debug APK
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: QianxiSchedule-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v') && vars.SIGNED_RELEASE_ENABLED == 'true'
    needs: verify
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore release signing key
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > release.jks
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties
      - name: Build signed release APK
        run: ./gradlew assembleRelease
      - name: Publish GitHub Release
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          RELEASE_APK="QianxiSchedule-${GITHUB_REF_NAME#v}.apk"
          mv "$APK" "$RELEASE_APK"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "潜溪课表 ${GITHUB_REF_NAME#v}" --generate-notes
          gh release upload "$GITHUB_REF_NAME" "$RELEASE_APK" --clobber
